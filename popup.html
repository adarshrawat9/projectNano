<!DOCTYPE html>
<html>
<head>
  <title>AI Visualizer</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      width: 340px;
      padding: 15px;
      background: #f5f7fa;
      color: #333;
    }
    h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin: 0 auto 10px auto;
      transition: background 0.2s;
    }
    button:hover {
      background: #357ac9;
    }
    #loading {
      display: none;
      text-align: center;
      color: #555;
      margin-bottom: 10px;
      font-style: italic;
    }
    #summaryText {
      margin-bottom: 10px;
      text-align: left;
      font-size: 14px;
    }
    .chart-container {
      width: 100%;
      height: 220px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h2>AI Visualizer</h2>
  <button id="summarizeBtn">Visualize Page</button>
  <p id="loading"> Generating visualization...</p>

  <div id="summaryText"></div>

  <div class="chart-container"><canvas id="barChart"></canvas></div>
  <div class="chart-container"><canvas id="pieChart"></canvas></div>
  <div class="chart-container"><canvas id="lineChart"></canvas></div>

  <script src="chart.js"></script>
  <script src="popup.js"></script>
</body>
</html>
