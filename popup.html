<!DOCTYPE html>
<html>
<head>
  <title>AI Visualizer Pro</title>
  <link href="popup.css" rel="stylesheet"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <img src="icon.png" alt="AI Visualizer" class="app-icon">
        <h1>AI Visualizer Pro</h1>
        <div class="header-actions">
          <button id="clearChatBtn" class="icon-btn" title="Clear Chat">🗑️</button>
          <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
        </div>
      </div>
    </header>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button id="screenModeBtn" class="mode-btn active">📱 Screen Capture</button>
      <button id="manualModeBtn" class="mode-btn">✍️ Manual Input</button>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
      <div class="welcome-message">
        <div class="welcome-content">
          <h3>Welcome to AI Visualizer Pro!</h3>
          <p>Choose your mode:</p>
          <ul>
            <li><strong>Screen Capture:</strong> Analyze current webpage content</li>
            <li><strong>Manual Input:</strong> Type your own prompts</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-container">
      <div class="input-wrapper">
        <textarea 
          id="manualInput" 
          placeholder="Type your prompt here..." 
          rows="3"
          style="display: none;"
        ></textarea>
        <div class="input-actions">
          <button id="sendBtn" class="send-btn">
            <span class="btn-text">Send</span>
            <span class="btn-icon">🚀</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="loading-indicator" style="display: none;">
      <div class="loading-spinner"></div>
      <span class="loading-text">Processing with AI...</span>
    </div>


    <!-- Charts Container -->
    <div id="chartsContainer" class="charts-container" style="display: none;">
      <div class="charts-header">
        <h3>Data Visualization</h3>
        <button id="downloadChartsBtn" class="download-btn">📥 Download Charts</button>
      </div>
      <div class="chart-container">
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="lineChart"></canvas>
      </div>
    </div>
  </div>

  <script src="chart.js"></script>
  <script src="popup.js"></script>
</body>
</html>
